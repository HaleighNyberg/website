<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<meta name="robots" content="noindex">
<title>404 &middot; Haleigh Nyberg</title>
<link href="data:image/svg+xml,&lt;svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'&gt;&lt;circle cx='16' cy='16' r='14' fill='%23051525' stroke='%234A7FA5' stroke-width='1.5'/&gt;&lt;circle cx='16' cy='16' r='3' fill='%23ae7634'/&gt;&lt;/svg&gt;" rel="icon">
<style>
    html, body {
        height: 100%;
        margin: 0;
        background: #051525;
        color: #c7d7e6;
        font-family: ui-monospace, 'Cascadia Code', Consolas, 'SF Mono', monospace;
    }
    .wrap {
        position: relative;
        z-index: 1;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.1rem;
        text-align: center;
        padding: 2rem;
        box-sizing: border-box;
    }
    h1 {
        font-size: 1.05rem;
        font-weight: 400;
        letter-spacing: 0.2em;
        margin: 0;
        color: #4a7fa5;
        text-transform: uppercase;
    }
    p {
        margin: 0;
        font-size: 0.85rem;
        letter-spacing: 0.05em;
        opacity: 0.75;
    }
    a {
        color: #7fb4d9;
        text-decoration: none;
        border-bottom: 1px solid rgba(127, 180, 217, 0.35);
        padding-bottom: 2px;
        transition: color 160ms ease, border-color 160ms ease;
    }
    a:hover {
        color: #aed2ec;
        border-color: rgba(174, 210, 236, 0.6);
    }
    .star {
        position: fixed;
        width: 2px;
        height: 2px;
        border-radius: 50%;
        background: #9db8cc;
    }
</style>
</head>
<body>
<div class="wrap">
    <h1>404 &middot; adrift</h1>
    <p>~$ requested path not found in this system</p>
    <p><a href="/">return to the island</a></p>
</div>
<script>
    // A few faint stars so the page matches the sky it fell out of.
    for (let i = 0; i < 40; i++) {
        var s = document.createElement('div');
        s.className = 'star';
        s.style.left = (Math.random() * 100) + 'vw';
        s.style.top = (Math.random() * 100) + 'vh';
        s.style.opacity = (0.12 + Math.random() * 0.5).toFixed(2);
        document.body.appendChild(s);
    }
</script>
</body>
</html>
